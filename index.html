<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>敲敲乐 · 豆豆模板生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all';this.onload=null">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" async onload="window._jszipReady=true"></script>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{touch-action:manipulation;height:100%}
:root{
  --bg:#0d0c0b;--surface:#1a1714;--surface2:#24211d;
  --border:color-mix(in srgb,#3a3530 60%,transparent);
  --text:#e8e3dc;--text2:#9e968b;--text3:#6b6359;
  --accent:#e8943a;--accent2:#c7772a;
  --danger:#d44;--success:#5c9;
}
[data-theme="light"]{
  --bg:#f0ede7;--surface:#ffffff;--surface2:#ece8e1;
  --border:color-mix(in srgb,#b8b0a5 55%,transparent);
  --text:#1a1714;--text2:#595448;--text3:#8a8276;
  --accent:#d47820;--accent2:#b5651a;
  --danger:#c33;--success:#4a8;
}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .35s,color .35s}
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);gap:10px}
.toolbar-title{font-family:Syne,sans-serif;font-size:13px;font-weight:700;color:var(--text);letter-spacing:.3px}
.theme-btn{font-family:inherit;font-size:14px;padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s;line-height:1}
.theme-btn:hover{color:var(--text);border-color:var(--accent)}
.app{display:flex;width:100%;margin:0 auto;padding:10px;gap:10px;min-height:calc(100vh - 36px)}
aside{width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:8px}
main{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.panel-section{padding:14px 14px}
.panel-section+.panel-section{border-top:1px solid var(--border)}
.section-title{font-family:Syne,sans-serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;letter-spacing:.3px}
label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;letter-spacing:.3px}
.btn{font-family:inherit;font-size:13px;font-weight:600;border:none;border-radius:5px;cursor:pointer;padding:9px 18px;transition:all .15s;letter-spacing:.3px}
.btn-primary{background:var(--accent);color:#000;width:100%}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:disabled{opacity:.4;cursor:default}
.btn-secondary{background:var(--surface2);color:var(--text2);flex:1}
.btn-secondary:hover{color:var(--text)}
.btn-sm{padding:6px 14px;font-size:12px;flex:1 1 auto}
.btn-xs{padding:3px 8px;font-size:10px}
.export-row{display:flex;gap:6px}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;background:var(--surface2);border-radius:3px;outline:none;margin:8px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer}
.param-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.param-row label{flex:0 0 58px;margin:0;font-size:11px}
.param-row input[type=range]{flex:1;margin:0}
.param-row .param-val{flex:0 0 32px;font-size:11px;text-align:right;color:var(--text2);font-variant-numeric:tabular-nums}
.toggle-row{display:flex;align-items:center;gap:8px;margin:7px 0}
.toggle-row label{flex:1;margin:0;cursor:pointer;font-size:12px}
.toggle-sw{position:relative;width:30px;height:16px;flex-shrink:0}
.toggle-sw input{display:none}
.toggle-sw .slider{position:absolute;inset:0;background:var(--surface2);border-radius:9px;transition:.2s;cursor:pointer}
.toggle-sw input:checked+.slider{background:var(--accent)}
.toggle-sw .slider::after{content:'';position:absolute;width:10px;height:10px;left:3px;top:3px;background:var(--text);border-radius:50%;transition:.2s}
.toggle-sw input:checked+.slider::after{transform:translateX(14px)}
.drop-zone{border:2px dashed var(--border);border-radius:6px;padding:16px;text-align:center;color:var(--text3);font-size:11px;cursor:pointer;transition:all .15s}
.drop-zone.drag-over{border-color:var(--accent);color:var(--accent)}
.drop-zone.has-image{border-style:solid}
.preview-container{background:var(--bg);border-radius:6px;overflow:hidden;min-height:160px;display:flex;align-items:center;justify-content:center}
.preview-container img{max-width:100%;max-height:320px;object-fit:contain}
.grid-editor-wrap{display:flex;justify-content:center;overflow:auto;margin-top:4px}
.grid-editor-wrap canvas{cursor:pointer;border-radius:4px}
.dither-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;background:var(--accent);color:#000;font-weight:700;margin-left:4px}
.dither-off .dither-badge{background:var(--surface2);color:var(--text3)}
.stat-table{width:100%;border-collapse:collapse;font-size:10px}
.stat-table th{color:var(--text3);font-weight:500;padding:2px 4px;border-bottom:1px solid var(--border);text-align:left}
.stat-table td{padding:2px 4px;border-bottom:1px solid color-mix(in srgb,var(--border) 40%,transparent)}
.stat-table .num{color:var(--accent);font-weight:700;font-variant-numeric:tabular-nums}
.stat-table .count{text-align:right;font-weight:600}
.stat-table .pct{text-align:right;color:var(--text2)}
.swatch-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.swatch{width:22px;height:22px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:all .1s}
.swatch:hover{border-color:var(--text3)}
.swatch.selected{border-color:var(--accent);box-shadow:0 0 5px var(--accent)}
.info-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:4px}
.toast-fixed{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:8px 20px;border-radius:20px;font-size:12px;z-index:999;animation:toastIn .3s ease,toastOut .3s ease 1.7s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
@media(max-width:768px){
  .app{flex-direction:column;padding:6px;gap:6px}
  aside{width:100%}
  .toolbar{padding:4px 8px}
  .toolbar-title{font-size:11px}
}
.view3d-container{width:100%;aspect-ratio:1;max-height:70vh;min-height:260px;border-radius:6px;overflow:hidden;background:var(--surface);flex:1 1 auto}
.view3d-container canvas{display:block;width:100%!important;height:100%!important}
.btn-remove-bg{margin-top:6px;width:100%}
.btn-remove-bg.loading{opacity:.6;pointer-events:none}
.btn-remove-bg .spinner{display:none;width:12px;height:12px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
.btn-remove-bg.loading .spinner{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.color-picker-wrap{display:flex;align-items:center;gap:6px;margin:5px 0}
.btn-mode{flex:1;text-align:center;padding:4px 0;font-size:10px;font-weight:600;cursor:pointer;background:var(--surface2);color:var(--text2);border:1px solid transparent;border-radius:5px;transition:all .15s;user-select:none}
.btn-mode.active{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-mode:hover:not(.active){color:var(--text)}
</style>
</head>
<body>
<div class="toolbar">
  <span class="toolbar-title">李玉敲敲乐生成器</span>
  <span style="display:flex;align-items:center;gap:10px">
    <a href="https://www.douyin.com/user/MS4wLjABAAAAsXCzSCGDiaC3GVu4Z74XtyYtXlgUWPp4_QtkwLsSMnI" target="_blank" style="color:var(--text2);text-decoration:none;font-size:12px;transition:color .2s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">抖音主页</a>
    <button class="theme-btn" id="themeToggle" title="切换深色/浅色模式">☀</button>
  </span>
</div>

<div class="app">
  <!-- LEFT PANEL -->
  <aside class="panel">
    <!-- Upload -->
    <div class="panel-section">
      <div class="section-title">上传图片</div>
      <div class="drop-zone" id="dropZone" style="position:relative">拖拽 / 点击 / Ctrl+V 粘贴
        <input type="file" id="hiddenFileInput" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0">
      </div>
      <button class="btn btn-secondary btn-remove-bg" id="btnRemoveBg" style="display:none"><span class="spinner"></span>AI 一键去背景</button>
    </div>

    <!-- Grid size + quantize -->
    <div class="panel-section">
      <div class="section-title">网格设置</div>
      <label>网格尺寸 <span id="gridVal">16</span></label>
      <input type="range" id="gridSize" min="8" max="64" value="16" step="1">
      <label>颜色数量 <span id="colorVal">16</span></label>
      <input type="range" id="nColors" min="4" max="32" value="16" step="1">
      <div class="toggle-row">
        <label class="dither-off" id="ditherLabel">Floyd-Steinberg 抖动<span class="dither-badge">OFF</span></label>
        <label class="toggle-sw"><input type="checkbox" id="ditherToggle"><span class="slider"></span></label>
      </div>
    </div>

    <!-- 3D Parameters -->
    <div class="panel-section">
      <div class="section-title">3D 打印参数 (mm)</div>
      <div class="param-row"><label>豆子直径</label><input type="range" id="beadDia" min="0.5" max="20" value="10" step="0.1"><span class="param-val" id="beadDiaVal">10</span></div>
      <div class="param-row"><label>格内间距</label><input type="range" id="innerGap" min="5" max="25" value="10" step="0.1"><span class="param-val" id="innerGapVal">10</span></div>
      <div class="param-row"><label>墙壁厚度</label><input type="range" id="wallThick" min="0.05" max="3" value="1" step="0.01"><span class="param-val" id="wallThickVal">1</span></div>
      <div class="param-row"><label>墙壁高度</label><input type="range" id="wallHeight" min="0.5" max="10" value="10" step="0.1"><span class="param-val" id="wallHeightVal">10</span></div>
      <div class="param-row"><label>底板厚度</label><input type="range" id="baseThick" min="0.2" max="5" value="0.4" step="0.1"><span class="param-val" id="baseThickVal">0.4</span></div>
      <div class="param-row"><label>内角倒角</label><input type="range" id="chamfer" min="0" max="1" value="0" step="0.01"><span class="param-val" id="chamferVal">0.00</span></div>
      <div class="param-row"><label>卡扣槽深</label><input type="range" id="snapDepth" min="0" max="0.5" value="0" step="0.01"><span class="param-val" id="snapDepthVal">0.00</span></div>
      <div class="param-row"><label>卡扣槽高</label><input type="range" id="snapHeight" min="0" max="2" value="0.5" step="0.05"><span class="param-val" id="snapHeightVal">0.50</span></div>
    </div>

    <!-- Options -->
    <div class="panel-section">
      <div class="section-title">选项</div>
      <div class="toggle-row">
        <label>包含底板</label>
        <label class="toggle-sw"><input type="checkbox" id="includeBase" checked><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <label>网格模板模式</label>
        <label class="toggle-sw"><input type="checkbox" id="outlineMode" checked><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <label>显示豆子</label>
        <label class="toggle-sw"><input type="checkbox" id="showBeads" checked><span class="slider"></span></label>
      </div>
    </div>

    <!-- Export -->
    <div class="panel-section">
      <div class="section-title">导出</div>
      <button class="btn btn-primary" id="exportBoard3MF">导出网格模板 3MF</button>
      <button class="btn btn-primary" id="exportBeads3MF" style="margin-top:6px">导出豆豆 3MF</button>
      <div class="export-row" style="margin-top:6px">
        <button class="btn btn-secondary btn-sm" id="exportSTL">STL</button>
        <button class="btn btn-secondary btn-sm" id="exportPNG">PNG</button>
        <button class="btn btn-secondary btn-sm" id="exportCSV">CSV</button>
      </div>
    </div>
  </aside>

  <!-- RIGHT PANEL -->
  <main class="panel">
    <!-- Grid Editor -->
    <div class="panel-section" id="editorSection" style="display:none">
      <div class="section-title">网格编辑器</div>
      <div class="toggle-row">
        <label id="paintLabel">涂抹模式<span class="dither-badge" style="background:var(--surface2);color:var(--text3)" id="paintBadge">OFF</span></label>
        <label class="toggle-sw"><input type="checkbox" id="paintToggle"><span class="slider"></span></label>
      </div>
      <div class="color-picker-wrap" id="colorPickerWrap" style="display:none">
        <label style="margin:0;flex-shrink:0;font-size:10px">自定义色</label>
        <input type="color" id="customColorPicker" value="#e8943a" style="width:28px;height:22px;border:none;border-radius:4px;cursor:pointer;background:transparent;padding:0">
      </div>
      <div class="toggle-row">
        <label id="eraseLabel">擦除模式<span class="dither-badge" style="background:var(--surface2);color:var(--text3)" id="eraseBadge">OFF</span></label>
        <label class="toggle-sw"><input type="checkbox" id="eraseToggle"><span class="slider"></span></label>
      </div>
      <div class="swatch-row" id="swatchRow" style="display:none"></div>
      <div class="grid-editor-wrap" style="margin-top:8px">
        <canvas id="gridCanvas"></canvas>
      </div>
      <div class="export-row" style="margin-top:8px">
        <button class="btn btn-secondary btn-sm" id="btnActivateAll">全部激活</button>
        <button class="btn btn-secondary btn-sm" id="btnClearAll">全部清除</button>
      </div>
      <div class="export-row" style="margin-top:6px">
        <button class="btn btn-secondary btn-sm" id="btnSaveProject">保存项目</button>
        <button class="btn btn-secondary btn-sm" id="btnLoadProject">加载项目</button>
        <input type="file" id="loadFileInput" accept=".bean" style="display:none">
      </div>
    </div>

    <!-- 3D Preview -->
    <div class="panel-section" id="section3D">
      <div class="section-title">3D 预览</div>
      <div class="view3d-container" id="view3D"></div>
    </div>

    <!-- Stats -->
    <div class="panel-section" id="statsSection" style="display:none">
      <div class="section-title">颜色统计 & 采购清单</div>
      <div style="max-height:400px;overflow:auto">
        <table class="stat-table" id="statTable"><tbody></tbody></table>
      </div>
    </div>
  </main>
</div>

<script>
// ── Theme management ──
(function(){
  const saved=localStorage.getItem('bean-knock-theme');
  if(saved==='light')document.documentElement.setAttribute('data-theme','light');
})();
const _themeBtn=document.getElementById('themeToggle');
if(_themeBtn){
  if(document.documentElement.hasAttribute('data-theme'))_themeBtn.textContent='\u263E';
  _themeBtn.addEventListener('click',()=>{
    const el=document.documentElement;
    const isLight=el.hasAttribute('data-theme');
    if(isLight){el.removeAttribute('data-theme');localStorage.setItem('bean-knock-theme','dark');_themeBtn.textContent='\u2600';}
    else{el.setAttribute('data-theme','light');localStorage.setItem('bean-knock-theme','light');_themeBtn.textContent='\u263E';}
    if(window._scene3d){
      const bg=getComputedStyle(el).getPropertyValue('--surface').trim()||'#1a1714';
      window._scene3d.background=new THREE.Color(bg);
    }
  });
}
(function(){
  // ── State ──
  let srcImage=null,pixelMap=null,palette=null,activeMask=null;
  let gridW=16,gridH=16,nColors=16,useDither=false;
  let paintColorIdx=0,paintMode=false,eraseMode=false;
  let outCanvas=document.createElement('canvas'),outCtx=outCanvas.getContext('2d');

  // Expose state for 3D module
  window.pixelMap=null;window.activeMask=null;window.palette=null;
  window.gridW=16;window.gridH=16;
  function syncGlobalState(){
    window.pixelMap=pixelMap;window.activeMask=activeMask;
    window.palette=palette;window.gridW=gridW;window.gridH=gridH;
  }

  // ── DOM refs ──
  const $dz=id('dropZone');
  const $gs=id('gridSize'),$gv=id('gridVal'),$nc=id('nColors'),$cv=id('colorVal');
  const $dt=id('ditherToggle'),$dl=id('ditherLabel');
  const $ed=id('editorSection'),$gc=id('gridCanvas'),$gctx=$gc.getContext('2d');
  const $pt=id('paintToggle'),$pb=id('paintBadge'),$swr=id('swatchRow');
  const $ss=id('statsSection'),$st=id('statTable');
  const $et=id('eraseToggle'),$eb=id('eraseBadge');
  const $ccp=id('customColorPicker'),$cpw=id('colorPickerWrap');
  const $bsp=id('btnSaveProject'),$blp=id('btnLoadProject'),$lfi=id('loadFileInput');
  const $aa=id('btnActivateAll'),$ca=id('btnClearAll');
  const $ib=id('includeBase'),$om=id('outlineMode'),$sb=id('showBeads');
  const $bd=id('beadDia'),$wt=id('wallThick'),$wh=id('wallHeight'),$bt=id('baseThick'),$ch=id('chamfer'),$sd=id('snapDepth'),$sh=id('snapHeight');
  const $v3d=id('view3D');
  const $rbg=id('btnRemoveBg');
  let _camInit=false; // track if camera has been positioned

  function id(s){return document.getElementById(s)}

  // ── 3D param getters ──
  function getParams(){
    return{
      beadDia:parseFloat($bd.value),
      innerGap:parseFloat(document.getElementById('innerGap').value),
      wallThick:parseFloat($wt.value),
      wallHeight:parseFloat($wh.value),
      baseThick:parseFloat($bt.value),
      chamfer:parseFloat($ch.value),
      snapDepth:parseFloat($sd.value),
      snapHeight:parseFloat($sh.value),
      includeBase:$ib.checked,
      outlineMode:$om.checked,
      showBeads:$sb.checked,
    };
  }

  // ── Toast ──
  function toast(msg){
    const e=document.createElement('div');e.className='toast-fixed';e.textContent=msg;
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),2000);
  }

  // ── Color name lookup ──
  const COLOR_NAMES={
    '#ffffff':'白','#fff8dc':'奶油','#ffd700':'黄','#ff8c00':'橙',
    '#e60000':'红','#ff69b4':'粉','#8b00ff':'紫','#0000cd':'深蓝',
    '#87ceeb':'浅蓝','#008000':'绿','#90ee90':'浅绿','#8b4513':'棕',
    '#808080':'灰','#1a1a1a':'黑','#8b0000':'深红','#006400':'深绿',
    '#f5deb3':'米色','#00ced1':'青','#ffea00':'明黄','#ffd600':'金',
    '#ff6d00':'亮橙','#ff1744':'亮红','#f50057':'玫红','#ff80ab':'浅粉',
    '#d500f9':'亮紫','#651fff':'靛蓝','#2979ff':'蓝','#00b0ff':'天蓝',
    '#00e5ff':'亮青','#00e676':'翠绿','#76ff03':'黄绿','#795548':'咖啡',
    '#9e9e9e':'中灰','#212121':'深黑','#b71c1c':'暗红','#0d47a1':'暗蓝',
    '#1b5e20':'暗绿','#4a148c':'暗紫','#efebe9':'米白','#ffab91':'桃色',
    '#bdbdbd':'银色','#fff0f5':'粉白','#ffb6c1':'淡粉','#ffdab9':'浅桃',
    '#fffacd':'淡黄','#b2dfdb':'薄荷','#b3e5fc':'淡蓝','#e1bee7':'薰衣',
    '#d1c4e9':'淡紫','#cfd8dc':'浅灰','#fff8e1':'奶白','#c8e6c9':'浅绿2',
    '#bcaaa4':'暖灰',
  };
  function approxColorName(r,g,b){
    const hex='#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
    const low=hex.toLowerCase();
    if(COLOR_NAMES[low])return COLOR_NAMES[low];
    const h=r*65536+g*256+b;
    let best='',bestD=Infinity;
    for(const[k,v]of Object.entries(COLOR_NAMES)){
      const rr=parseInt(k.slice(1,3),16),gg=parseInt(k.slice(3,5),16),bb=parseInt(k.slice(5,7),16);
      const d=(rr-r)**2+(gg-g)**2+(bb-b)**2;
      if(d<bestD){bestD=d;best=v}
    }
    return bestD<10000?best:'';
  }

  // ── Floyd-Steinberg dither ──
  function floydSteinbergDither(pixels,w,h,paletteLab){
    const rgb=[];
    for(let i=0;i<pixels.length;i+=4){
      rgb.push([pixels[i],pixels[i+1],pixels[i+2]]);
    }
    const indices=new Uint8Array(rgb.length);
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        const idx=y*w+x;
        let [r,g,b]=rgb[idx];
        let bi=0,bd=Infinity;
        for(let pi=0;pi<paletteLab.length;pi++){
          const pl=paletteLab[pi];
          const rl=r/255,gl=g/255,bl=b/255;
          const l=0.2126*rl+0.7152*gl+0.0722*bl;
          const d=(pl[0]-l)**2+(pl[1]-rl)**2+(pl[2]-gl)**2;
          if(d<bd){bd=d;bi=pi}
        }
        indices[idx]=bi;
        const pc=paletteLab[bi];
        const pR=Math.max(0,Math.min(255,Math.round(pc[1]*255)));
        const pG=Math.max(0,Math.min(255,Math.round(pc[2]*255)));
        const pB=Math.max(0,Math.min(255,Math.round(pc[0]*255*2)));
        const errR=r-pR,errG=g-pG,errB=b-pB;
        const spread=[
          [x+1,y,7/16],[x-1,y+1,3/16],[x,y+1,5/16],[x+1,y+1,1/16]
        ];
        for(const[sx,sy,wgt]of spread){
          if(sx>=0&&sx<w&&sy>=0&&sy<h){
            const si=sy*w+sx;
            rgb[si][0]=Math.max(0,Math.min(255,rgb[si][0]+errR*wgt));
            rgb[si][1]=Math.max(0,Math.min(255,rgb[si][1]+errG*wgt));
            rgb[si][2]=Math.max(0,Math.min(255,rgb[si][2]+errB*wgt));
          }
        }
      }
    }
    return indices;
  }

  // ── Image processing ──
  function processImage(){
    if(!srcImage)return;
    _camInit=false; // reset camera for new image
    const baseGrid=parseInt($gs.value);
    nColors=parseInt($nc.value);
    useDither=$dt.checked;
    // Auto-calculate grid from image aspect ratio, keeping baseGrid as the shorter side
    const imgW=srcImage.width,imgH=srcImage.height;
    const ratio=imgW/imgH;
    if(imgW>=imgH){gridW=baseGrid;gridH=Math.round(baseGrid/ratio);}
    else{gridH=baseGrid;gridW=Math.round(baseGrid*ratio);}
    gridW=Math.max(4,gridW);gridH=Math.max(4,gridH);
    useDither=$dt.checked;
    $gv.textContent=gridW+'×'+gridH;$cv.textContent=nColors;
    $dl.className=useDither?'':'dither-off';
    const dbadge=$dl.querySelector('.dither-badge');
    if(dbadge)dbadge.textContent=useDither?'ON':'OFF';

    const scale=Math.min(1,Math.min(gridW/srcImage.width,gridH/srcImage.height));
    const sw=Math.round(srcImage.width*scale),sh=Math.round(srcImage.height*scale);

    // Quantize using k-means like approach
    const cw=Math.floor(gridW/nColors*2)||2,ch=Math.floor(gridH/nColors*2)||2;
    outCanvas.width=sw;outCanvas.height=sh;
    outCtx.imageSmoothingEnabled=false;
    outCtx.drawImage(srcImage,0,0,sw,sh);
    const data=outCtx.getImageData(0,0,sw,sh).data;

    // Collect samples
    const samples=[];
    for(let y=0;y<sh;y+=Math.max(1,Math.floor(sh/200))){
      for(let x=0;x<sw;x+=Math.max(1,Math.floor(sw/200))){
        const i=(y*sw+x)*4;
        if(data[i+3]>20)samples.push([data[i],data[i+1],data[i+2]]);
      }
    }
    if(samples.length<10)samples.push([128,128,128]);

    // K-means color quantize — hue-spread init for max color diversity
    const k=Math.min(nColors,samples.length);
    const hslSamples=samples.map(s=>{const r=s[0]/255,g=s[1]/255,b=s[2]/255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h=0;if(mx!==mn){const d=mx-mn;h=(mx===r?((g-b)/d+(g<b?6:0))/6:mx===g?((b-r)/d+2)/6:((r-g)/d+4)/6)}return{rgb:s,h};});
    hslSamples.sort((a,b)=>a.h-b.h);
    let centroids=Array.from({length:k},(_,i)=>hslSamples[Math.min(Math.floor(i*hslSamples.length/k),hslSamples.length-1)].rgb);
    for(let iter=0;iter<20;iter++){
      const clusters=Array.from({length:k},()=>[]);
      for(const s of samples){
        let bj=0,bd=Infinity;
        for(let j=0;j<k;j++){
          const d=(centroids[j][0]-s[0])**2+(centroids[j][1]-s[1])**2+(centroids[j][2]-s[2])**2;
          if(d<bd){bd=d;bj=j}
        }
        clusters[bj].push(s);
      }
      for(let j=0;j<k;j++){
        if(clusters[j].length){
          let sr=0,sg=0,sb=0;
          for(const s of clusters[j]){sr+=s[0];sg+=s[1];sb+=s[2]}
          centroids[j]=[Math.round(sr/clusters[j].length),Math.round(sg/clusters[j].length),Math.round(sb/clusters[j].length)];
        }
      }
    }
    // Snap centroids to nearest actual sample color to prevent drift
    for(let j=0;j<k;j++){
      let bestS=samples[0],bestD=Infinity;
      for(const s of samples){
        const d=(centroids[j][0]-s[0])**2+(centroids[j][1]-s[1])**2+(centroids[j][2]-s[2])**2;
        if(d<bestD){bestD=d;bestS=s;}
      }
      centroids[j]=[bestS[0],bestS[1],bestS[2]];
    }
    // Sort by frequency
    const freq=centroids.map((c,i)=>[i,0]);
    for(const s of samples){
      let bj=0,bd=Infinity;
      for(let j=0;j<k;j++){
        const d=(centroids[j][0]-s[0])**2+(centroids[j][1]-s[1])**2+(centroids[j][2]-s[2])**2;
        if(d<bd){bd=d;bj=j}
      }
      freq[bj][1]++;
    }
    freq.sort((a,b)=>b[1]-a[1]);
    palette=freq.map(([i])=>({r:centroids[i][0],g:centroids[i][1],b:centroids[i][2]}));

    // Resize to grid — preserve aspect ratio to prevent distortion
    outCanvas.width=gridW;outCanvas.height=gridH;
    const imgRatio=srcImage.width/srcImage.height;
    const gridRatio=gridW/gridH;
    let dw,dh,dx,dy;
    if(imgRatio>gridRatio){dh=gridH;dw=Math.round(dh*imgRatio);dx=Math.floor((gridW-dw)/2);dy=0;}
    else{dw=gridW;dh=Math.round(dw/imgRatio);dx=0;dy=Math.floor((gridH-dh)/2);}
    outCtx.clearRect(0,0,gridW,gridH);
    outCtx.imageSmoothingEnabled=false;
    outCtx.drawImage(srcImage,dx,dy,dw,dh);
    const pd=outCtx.getImageData(0,0,gridW,gridH).data;

    // Build palette LAB
    const pLab=palette.map(c=>{
      const rl=c.r/255,gl=c.g/255,bl=c.b/255;
      return [0.2126*rl+0.7152*gl+0.0722*bl,rl,gl];
    });

    // Map pixels
    if(useDither){
      pixelMap=floydSteinbergDither(pd,gridW,gridH,pLab);
    }else{
      pixelMap=new Uint8Array(gridW*gridH);
      for(let i=0;i<gridW*gridH;i++){
        const r=pd[i*4],g=pd[i*4+1],b=pd[i*4+2];
        let bi=0,bd=Infinity;
        for(let pi=0;pi<pLab.length;pi++){
          const pl=pLab[pi];
          const rl=r/255,gl=g/255,bl=b/255;
          const l=0.2126*rl+0.7152*gl+0.0722*bl;
          const d=(pl[0]-l)**2+(pl[1]-rl)**2+(pl[2]-gl)**2;
          if(d<bd){bd=d;bi=pi}
        }
        pixelMap[i]=bi;
      }
    }

    activeMask=new Uint8Array(gridW*gridH);
    for(let i=0;i<gridW*gridH;i++)activeMask[i]=pd[i*4+3]>=30?1:0;

    syncGlobalState();
    updateAll();
  }

  // ── Grid editor ──
  function renderGridEditor(){
    const cell=Math.max(12,Math.min(28,Math.floor(400/gridW)));
    const w=gridW*cell,h=gridH*cell;
    $gc.width=w;$gc.height=h;
    $gc.style.width=w+'px';$gc.style.height=h+'px';
    const ctx=$gctx;
    for(let y=0;y<gridH;y++){
      for(let x=0;x<gridW;x++){
        const i=y*gridW+x;
        const ci=pixelMap[i];
        const c=palette[ci];
        const active=activeMask[i];
        ctx.fillStyle=active?`rgb(${c.r},${c.g},${c.b})`:'#3a3530';
        ctx.fillRect(x*cell,y*cell,cell,cell);
        if(active){
          // 3D bead effect
          const g=ctx.createRadialGradient(x*cell+cell*.3,y*cell+cell*.3,0,x*cell+cell*.5,y*cell+cell*.5,cell*.7);
          g.addColorStop(0,`rgba(255,255,255,0.35)`);
          g.addColorStop(1,`rgba(0,0,0,0.15)`);
          ctx.fillStyle=g;
          ctx.fillRect(x*cell,y*cell,cell,cell);
        }
        // Border
        ctx.strokeStyle='rgba(255,255,255,0.06)';
        ctx.strokeRect(x*cell,y*cell,cell,cell);
        // Number (palette color index)
        const num=(pixelMap[i]+1).toString();
        ctx.fillStyle=active?'rgba(0,0,0,0.5)':'rgba(255,255,255,0.15)';
        ctx.font=`${Math.max(8,cell*.4)}px "Space Grotesk",sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(num,x*cell+cell/2,y*cell+cell/2);
      }
    }
  }

  function updateSwatches(){

  function updateStats(){
    const counts=new Array(palette.length).fill(0);
    for(let i=0;i<pixelMap.length;i++)if(activeMask[i])counts[pixelMap[i]]++;
    const total=activeMask.reduce((a,b)=>a+b,0);
    const rows=palette.map((c,i)=>({i,c,count:counts[i]})).sort((a,b)=>b.count-a.count);
    let html='<tr><th>编号</th><th>颜色</th><th>名称</th><th>色号</th><th>数量</th><th>占比</th></tr>';
    rows.forEach((row,ri)=>{
      const r=row.c;
      const hex='#'+[r.r,r.g,r.b].map(v=>v.toString(16).padStart(2,'0')).join('');
      const name=approxColorName(r.r,r.g,r.b)||'—';
      html+=`<tr>
        <td class="num">${ri+1}</td>
        <td><span style="display:inline-block;width:14px;height:14px;border-radius:2px;background:${hex};vertical-align:middle;margin-right:4px"></span></td>
        <td>${name}</td>
        <td style="font-family:monospace;font-size:10px">${hex}</td>
        <td class="count">${row.count}</td>
        <td class="pct">${(row.count/total*100).toFixed(1)}%</td>
      </tr>`;
    });
    html+=`<tr style="font-weight:700;border-top:2px solid var(--border)"><td colspan="4">合计</td><td class="count">${total}</td><td class="pct">100%</td></tr>`;
    $st.innerHTML=html;
  }

      // Erase mode: clear the cell (left or right click)
      if(activeMask[i]){activeMask[i]=0;}
    }else if(isDouble&&paintMode){
      // Double-tap = erase in paint mode
      activeMask[i]=0;
    }else{
      if(paintMode){
        if(!activeMask[i])activeMask[i]=1;
        pixelMap[i]=paintColorIdx;

  // ── Canvas-based Background Removal ──
  $rbg.addEventListener('click',async()=>{
    if(!srcImage)return;
    $rbg.classList.add('loading');
    $rbg.firstChild.textContent='\u00A0';
    await new Promise(r=>setTimeout(r,50));
    try{
      const c=document.createElement('canvas');
      c.width=srcImage.width;c.height=srcImage.height;
      const ctx=c.getContext('2d');
      ctx.drawImage(srcImage,0,0);
      const imgData=ctx.getImageData(0,0,c.width,c.height);
      const d=imgData.data,w=c.width,h=c.height;

      // Sample edge pixels to detect dominant background color
      const ew=Math.max(1,Math.floor(w*0.05)),eh=Math.max(1,Math.floor(h*0.05));
      const samples=[];
      for(let y=0;y<eh;y++)for(let x=0;x<w;x++){
        samples.push([d[(y*w+x)*4],d[(y*w+x)*4+1],d[(y*w+x)*4+2]]);
        const by=h-1-y;
        samples.push([d[(by*w+x)*4],d[(by*w+x)*4+1],d[(by*w+x)*4+2]]);
      }
      for(let y=eh;y<h-eh;y++)for(let x=0;x<ew;x++){
        samples.push([d[(y*w+x)*4],d[(y*w+x)*4+1],d[(y*w+x)*4+2]]);
        samples.push([d[(y*w+(w-1-x))*4],d[(y*w+(w-1-x))*4+1],d[(y*w+(w-1-x))*4+2]]);
      }
      let sr=0,sg=0,sb=0;
      for(const s of samples){sr+=s[0];sg+=s[1];sb+=s[2];}
      const bR=Math.round(sr/samples.length),bG=Math.round(sg/samples.length),bB=Math.round(sb/samples.length);
      let varSum=0;
      for(const s of samples)varSum+=(s[0]-bR)**2+(s[1]-bG)**2+(s[2]-bB)**2;
      const threshold=Math.max(30,Math.min(120,Math.sqrt(varSum/samples.length)*2.5));

      // Remove similar colors
      for(let i=0;i<d.length;i+=4){
        const dr=d[i]-bR,dg=d[i+1]-bG,db=d[i+2]-bB;
        if(Math.sqrt(dr*dr+dg*dg+db*db)<threshold)d[i+3]=0;
      }
      ctx.putImageData(imgData,0,0);
      const url=c.toDataURL('image/png');
      const img=new Image();
      img.onload=()=>{
        srcImage=img;processImage();
        toast('背景已去除');
      };
      img.src=url;
    }catch(e){
      toast('去背景失败: '+e.message);
    }finally{
      $rbg.classList.remove('loading');
    }
  });

  // ── Slider sync ──
  $gs.addEventListener('input',()=>{if(srcImage)processImage()});
  $nc.addEventListener('input',()=>{if(srcImage)processImage()});
  $dt.addEventListener('change',()=>{if(srcImage)processImage()});
  // 3D param display sync
  [$bd,document.getElementById('innerGap'),$wt,$wh,$bt,$ch,$sd,$sh].forEach(sl=>{
    sl.addEventListener('input',()=>{
      const vid=sl.id+'Val',el=document.getElementById(vid);
      if(el)el.textContent=parseFloat(sl.value).toFixed(sl.id==='wallThick'||sl.id==='chamfer'||sl.id==='snapDepth'?2:1);
      render3DPreview();
    });
  });
  [$ib,$om,$sb].forEach(cb=>{cb.addEventListener('change',()=>{render3DPreview()})});

  // ══════════ 3D EXPORT ══════════

  function buildGeometry(){
    const p=getParams();
    const cellSize=p.innerGap+p.wallThick*2;
    const pegGap=p.wallThick;
    const baseH=p.baseThick,pegH=p.wallHeight;
    const margin=cellSize*2;
    const bw=gridW*cellSize+margin*2,bh=gridH*cellSize+margin*2;
    const kf=f=>Math.round(f*1e6)/1e6;
    const vstr=v=>v.map(kf).join(',');
    const board={verts:[],tris:[],vmap:new Map()};
    const groups={};
    for(let ci=0;ci<palette.length;ci++)groups[ci]={verts:[],tris:[],vmap:new Map()};

    function addVertex(group,v){
      const key=vstr(v);
      if(group.vmap.has(key))return group.vmap.get(key);
      const idx=group.verts.length;
      group.verts.push([kf(v[0]),kf(v[1]),kf(v[2])]);
      group.vmap.set(key,idx);
      return idx;
    }
    function addTri(group,v0,v1,v2){
      group.tris.push(addVertex(group,v0),addVertex(group,v1),addVertex(group,v2));
    }
    function addQuad(group,v0,v1,v2,v3){
      addTri(group,v0,v1,v2);addTri(group,v0,v2,v3);
    }
    function addBox(group,x0,y0,z0,x1,y1,z1){
      addQuad(group,[x0,y0,z0],[x1,y0,z0],[x1,y1,z0],[x0,y1,z0]);
      addQuad(group,[x0,y0,z1],[x1,y1,z1],[x1,y0,z1],[x0,y1,z1]);
      addQuad(group,[x0,y0,z0],[x0,y0,z1],[x1,y0,z1],[x1,y0,z0]);
      addQuad(group,[x0,y1,z0],[x1,y1,z0],[x1,y1,z1],[x0,y1,z1]);
      addQuad(group,[x0,y0,z0],[x0,y1,z0],[x0,y1,z1],[x0,y0,z1]);
      addQuad(group,[x1,y0,z0],[x1,y0,z1],[x1,y1,z1],[x1,y1,z0]);
    }
    function addTriPrism(group,ax,ay,bx,by,cx,cy,z0,z1){
      group.tris.push(ax,ay,z0,bx,by,z0,cx,cy,z0);
      group.tris.push(ax,ay,z1,cx,cy,z1,bx,by,z1);
      group.tris.push(ax,ay,z0,bx,by,z0,bx,by,z1, ax,ay,z0,bx,by,z1,ax,ay,z1);
      group.tris.push(bx,by,z0,cx,cy,z0,cx,cy,z1, bx,by,z0,cx,cy,z1,bx,by,z1);
      group.tris.push(cx,cy,z0,ax,ay,z0,ax,ay,z1, cx,cy,z0,ax,ay,z1,cx,cy,z1);
    }
    function addBoxChamfered(group,x0,y0,z0,x1,y1,z1,c){
      if(c<=0||(x1-x0)<=c*2||(y1-y0)<=c*2){addBox(group,x0,y0,z0,x1,y1,z1);return;}
      const pts=[
        [x0,y0+c],[x0+c,y0],[x1-c,y0],[x1,y0+c],
        [x1,y1-c],[x1-c,y1],[x0+c,y1],[x0,y1-c]
      ];
      // fan triangulation for bottom (z0) and top (z1)
      for(let i=1;i<7;i++){
        group.tris.push(pts[0][0],pts[0][1],z0, pts[i][0],pts[i][1],z0, pts[i+1][0],pts[i+1][1],z0);
        group.tris.push(pts[0][0],pts[0][1],z1, pts[i+1][0],pts[i+1][1],z1, pts[i][0],pts[i][1],z1);
      }
      // 8 side quads
      for(let i=0;i<8;i++){
        const j=(i+1)%8;
        group.tris.push(pts[i][0],pts[i][1],z0, pts[j][0],pts[j][1],z0, pts[j][0],pts[j][1],z1);
        group.tris.push(pts[i][0],pts[i][1],z0, pts[j][0],pts[j][1],z1, pts[i][0],pts[i][1],z1);
      }
    }

    // Bottom plate: only under active bean cells (bean outline area)
    if(p.includeBase){
      for(let bi=0;bi<activeMask.length;bi++){
        if(!activeMask[bi])continue;
        const bgx=bi%gridW,bgy=Math.floor(bi/gridW);
        const bx0=bgx*cellSize,by0=(gridH-bgy-1)*cellSize;
        addBox(board,bx0,by0,0,bx0+cellSize,by0+cellSize,baseH);
      }
    }
    // Grid template walls: at every boundary where at least one side has a bean (independent of base plate)
    if(p.outlineMode){
      const hw=p.wallThick*0.5,wallTop=baseH+pegH;
      function hasBean(gx,gy){
        if(gx<0||gx>=gridW||gy<0||gy>=gridH)return false;
        return !!activeMask[gy*gridW+gx];
      }
      // Horizontal boundaries (between row gy-1 and gy)
      for(let gy=0;gy<=gridH;gy++){
        for(let gx=0;gx<gridW;gx++){
          if(hasBean(gx,gy-1)||hasBean(gx,gy)){
            const wy=(gridH-gy)*cellSize;
            addBoxChamfered(board,gx*cellSize-hw,wy-hw,baseH,(gx+1)*cellSize+hw,wy+hw,wallTop,p.chamfer);
          }
        }
      }
      // Vertical boundaries (between col gx-1 and gx)
      for(let gx=0;gx<=gridW;gx++){
        for(let gy=0;gy<gridH;gy++){
          if(hasBean(gx-1,gy)||hasBean(gx,gy)){
            const wx=gx*cellSize;
            const wy=(gridH-gy)*cellSize;
            addBoxChamfered(board,wx-hw,wy-cellSize-hw,baseH,wx+hw,wy+hw,wallTop,p.chamfer);
          }
        }
      }
    }

    // Snap groove: thin groove on bead faces + wall ribs for snap-fit
    if(p.snapDepth>0&&p.snapHeight>0){
      const sd=p.snapDepth,sh=p.snapHeight;
      const grooveZ=baseH+pegH*0.5-sh*0.5; // groove at mid-height of bead
      const hw=p.wallThick*0.5;
      function hasBean(gx,gy){return gx>=0&&gx<gridW&&gy>=0&&gy<gridH&&activeMask[gy*gridW+gx];}
      // Wall ribs: thin horizontal protrusion toward bead
      for(let gy=0;gy<=gridH;gy++){
        for(let gx=0;gx<gridW;gx++){
          if(!(hasBean(gx,gy-1)&&hasBean(gx,gy)))continue;
          const wy=(gridH-gy)*cellSize;
          addBox(board,gx*cellSize-hw,wy-hw-sd,baseH,(gx+1)*cellSize+hw,wy-hw,grooveZ+sh);
          addBox(board,gx*cellSize-hw,wy+hw,baseH,(gx+1)*cellSize+hw,wy+hw+sd,grooveZ+sh);
        }
      }
      for(let gx=0;gx<=gridW;gx++){
        for(let gy=0;gy<gridH;gy++){
          if(!(hasBean(gx-1,gy)&&hasBean(gx,gy)))continue;
          const wx=gx*cellSize,wy=(gridH-gy)*cellSize;
          addBox(board,wx-hw-sd,wy-cellSize-hw,baseH,wx-hw,wy+hw,grooveZ+sh);
          addBox(board,wx+hw,wy-cellSize-hw,baseH,wx+hw+sd,wy+hw,grooveZ+sh);
        }
      }
    }
    // Beads
    if(p.showBeads!==false){
    for(let i=0;i<activeMask.length;i++){
      if(!activeMask[i])continue;
      const ci=pixelMap[i];
      const grp=groups[ci];
      const gx=i%gridW,gy=Math.floor(i/gridW);
      const ry=gridH-1-gy;
      const px=gx*cellSize+pegGap,py=ry*cellSize+pegGap;
      const px2=px+cellSize-pegGap*2,py2=py+cellSize-pegGap*2;
      const pz=baseH,pz2=baseH+pegH;

      if(p.snapDepth>0&&p.snapHeight>0){
        const sd=p.snapDepth,sh=p.snapHeight;
        const gz=baseH+pegH*0.5-sh*0.5;
        // Full-width lower
        addBoxChamfered(grp,px,py,baseH,px2,py2,gz,p.chamfer);
        // Groove: narrower waist
        addBoxChamfered(grp,px+sd,py+sd,gz,px2-sd,py2-sd,gz+sh,0);
        // Full-width upper
        addBoxChamfered(grp,px,py,gz+sh,px2,py2,pz2,p.chamfer);
      } else {
        addBoxChamfered(grp,px,py,pz,px2,py2,pz2,p.chamfer);
      }
    }
    }
    return{kf,cellSize,baseH,pegH,margin,bw,bh,board,groups:Object.fromEntries(Object.entries(groups).filter(([,g])=>g.verts.length>0))};
  }

  function buildSTLBlob(geo){
    const {kf,board,groups}=geo;
    const p=getParams();
    let tcount=0;
    if(board&&board.tris.length>0)tcount+=board.tris.length/3;
    for(const grp of Object.values(groups))tcount+=grp.tris.length/3;
    const buf=new ArrayBuffer(84+tcount*50);
    const view=new DataView(buf);
    view.setUint32(80,tcount,true);
    let ti=0;

    function writeTri(v0,v1,v2){
      const e1=[v1[0]-v0[0],v1[1]-v0[1],v1[2]-v0[2]];
      const e2=[v2[0]-v0[0],v2[1]-v0[1],v2[2]-v0[2]];
      const nx=e1[1]*e2[2]-e1[2]*e2[1];
      const ny=e1[2]*e2[0]-e1[0]*e2[2];
      const nz=e1[0]*e2[1]-e1[1]*e2[0];
      const len=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      const off=84+ti*50;
      view.setFloat32(off,nx/len,true);view.setFloat32(off+4,ny/len,true);view.setFloat32(off+8,nz/len,true);
      [v0,v1,v2].flat().forEach((v,j)=>view.setFloat32(off+12+j*4,kf(v),true));
      view.setUint16(off+48,0,true);
      ti++;
    }

    if(board&&board.tris.length>0){
      for(let i=0;i<board.tris.length;i+=3){
        writeTri(board.verts[board.tris[i]],board.verts[board.tris[i+1]],board.verts[board.tris[i+2]]);
      }
    }
    for(const grp of Object.values(groups)){
      for(let i=0;i<grp.tris.length;i+=3){
        writeTri(grp.verts[grp.tris[i]],grp.verts[grp.tris[i+1]],grp.verts[grp.tris[i+2]]);
      }
    }
    return new Blob([buf],{type:'application/octet-stream'});
  }

  // ── 3MF Export ──
  // Shared 3MF export: mode = 'board' | 'beads'
  async function export3MF(mode){
    if(!pixelMap)return toast('请先上传图片');
    if(typeof JSZip==='undefined')return toast('JSZip 仍在加载，请稍后重试');
    const geo=buildGeometry();
    const {board,groups}=geo;

    let resources='',build='',nextObjId=1,nextCGId=1;

    // Board (base plate + grid walls + snap ribs)
    if(mode!=='beads'&&board&&board.verts.length>0){
      const bpId=nextObjId++,bpCGId=nextCGId++;
      resources+=`\n    <object id="${bpId}" type="model" pid="${bpCGId}">\n      <mesh>\n        <vertices>`;
      board.verts.forEach(v=>resources+=`\n          <vertex x="${v[0]}" y="${v[1]}" z="${v[2]}"/>`);
      resources+=`\n        </vertices>\n        <triangles>`;
      for(let i=0;i<board.tris.length;i+=3){
        resources+=`\n          <triangle v1="${board.tris[i]}" v2="${board.tris[i+1]}" v3="${board.tris[i+2]}" p1="1"/>`;
      }
      resources+=`\n        </triangles>\n      </mesh>\n    </object>`;
      build+=`\n    <item objectid="${bpId}"/>`;
      resources+=`\n    <m:colorgroup id="${bpCGId}">\n      <m:color color="#2a2724"/>\n    </m:colorgroup>`;
    }

    // Per-color bead objects — each color on its own plate
    if(mode!=='board'){
      // Compute bounding box of all beads to determine plate spacing
      let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity,beadZ=0;
      for(let ci=0;ci<palette.length;ci++){
        const grp=groups[ci];
        if(!grp||grp.verts.length===0)continue;
        for(let vi=0;vi<grp.verts.length;vi++){
          const v=grp.verts[vi];
          if(v[0]<minX)minX=v[0];if(v[1]<minY)minY=v[1];
          if(v[0]>maxX)maxX=v[0];if(v[1]>maxY)maxY=v[1];
          if(v[2]>beadZ)beadZ=v[2];
        }
      }
      const bboxW=maxX-minX,bboxH=maxY-minY;
      const plateGap=20; // gap between plates
      // Arrange plates in a row: each plate holds one color's beads at origin-offset position
      let plateIndex=0;
      for(let ci=0;ci<palette.length;ci++){
        const grp=groups[ci];
        if(!grp||grp.verts.length===0)continue;
        const c=palette[ci];
        const hex='#'+[c.r,c.g,c.b].map(v=>v.toString(16).padStart(2,'0')).join('')+'FF';
        const objId=nextObjId++,cgId=nextCGId++;
        resources+=`\n    <object id="${objId}" type="model" pid="${cgId}">\n      <mesh>\n        <vertices>`;
        grp.verts.forEach(v=>resources+=`\n          <vertex x="${v[0]}" y="${v[1]}" z="${v[2]}"/>`);
        resources+=`\n        </vertices>\n        <triangles>`;
        for(let i=0;i<grp.tris.length;i+=3){
          resources+=`\n          <triangle v1="${grp.tris[i]}" v2="${grp.tris[i+1]}" v3="${grp.tris[i+2]}" p1="1"/>`;
        }
        resources+=`\n        </triangles>\n      </mesh>\n    </object>`;
        // Offset each plate so they don't overlap on the build surface
        const offsetX=plateIndex*(bboxW+plateGap);
        build+=`\n    <item objectid="${objId}" transform="1 0 0 0 1 0 0 0 1 ${(-minX+offsetX).toFixed(3)} ${(-minY).toFixed(3)} 0"/>`;
        resources+=`\n    <m:colorgroup id="${cgId}">\n      <m:color color="${hex}"/>\n    </m:colorgroup>`;
        plateIndex++;
      }
    }

    if(!build.trim())return toast('没有可导出的内容');

    const modelXml=`<?xml version="1.0" encoding="UTF-8"?>
<model unit="millimeter" xml:lang="en-US"
 xmlns="http://schemas.microsoft.com/3dmanufacturing/core/2015/02"
 xmlns:m="http://schemas.microsoft.com/3dmanufacturing/materials/2015/02">
  <resources>${resources}
  </resources>
  <build>${build}
  </build>
</model>`;

    const contentTypes=`<?xml version="1.0" encoding="UTF-8"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="model" ContentType="application/vnd.ms-package.3dmanufacturing-3dmodel+xml"/>
</Types>`;
    const rels=`<?xml version="1.0" encoding="UTF-8"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Target="/3D/3dmodel.model" Id="rel0" Type="http://schemas.microsoft.com/3dmanufacturing/2013/01/3dmodel"/>
</Relationships>`;

    const zip=new JSZip();
    zip.file('[Content_Types].xml',contentTypes);
    zip.file('_rels/.rels',rels);
    zip.file('3D/3dmodel.model',modelXml);

    const suffix=mode==='board'?'_board':'_beads';
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:6}});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`bean_knock_${gridW}x${gridH}${suffix}.3mf`;
    a.click();URL.revokeObjectURL(url);
    toast(mode==='board'?'网格模板 3MF 已导出':`豆豆 3MF 已导出（${plateIndex} 种颜色各一盘）`);
  }

  id('exportBoard3MF').addEventListener('click',()=>export3MF('board'));
  id('exportBeads3MF').addEventListener('click',()=>export3MF('beads'));

  // ── STL Export ──
  id('exportSTL').addEventListener('click',()=>{
    if(!pixelMap)return toast('请先上传图片');
    const geo=buildGeometry();
    const blob=buildSTLBlob(geo);
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`bean_knock_${gridW}x${gridH}.stl`;
    a.click();URL.revokeObjectURL(url);
    toast('STL 已导出');
  });

  // ── PNG Export ──
  id('exportPNG').addEventListener('click',()=>{
    if(!palette)return toast('请先上传图片');
    const a=document.createElement('a');
    a.download=`pixel_${gridW}x${gridH}.png`;
    a.href=$gc.toDataURL();a.click();
    toast('PNG 已导出');
  });

  // ── CSV Export ──
  id('exportCSV').addEventListener('click',()=>{
    if(!palette)return toast('请先上传图片');
    const counts=new Array(palette.length).fill(0);
    for(let i=0;i<pixelMap.length;i++)if(activeMask[i])counts[pixelMap[i]]++;
    const total=activeMask.reduce((a,b)=>a+b,0);
    let csv='\uFEFF编号,颜色名称,色号,数量,占比\n';
    const rows=palette.map((c,i)=>({i,c,count:counts[i]})).sort((a,b)=>b.count-a.count);
    rows.forEach((row,ri)=>{
      const r=row.c;
      const hex='#'+[r.r,r.g,r.b].map(v=>v.toString(16).padStart(2,'0')).join('');
      const name=approxColorName(r.r,r.g,r.b)||'';
      csv+=`${ri+1},${name},${hex},${row.count},${(row.count/total*100).toFixed(1)}%\n`;
    });
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='stats.csv';a.click();
    URL.revokeObjectURL(url);
    toast('CSV 已导出');
  });

})();
</script>
<script type="module">
let THREE, OrbitControls;
try {
  const m3 = await import('three');
  THREE = m3;
  OrbitControls = (await import('three/addons/controls/OrbitControls.js')).OrbitControls;
} catch(e) {
  console.warn('Three.js 加载失败，3D 预览不可用', e);
}

let scene, camera, renderer, controls, currentGroup;

function createChamferedBoxGeometry(w, h, d, chamfer) {
  if (chamfer <= 0 || w <= chamfer*2 || h <= chamfer*2 || d <= chamfer*2) {
    return new THREE.BoxGeometry(w, h, d);
  }
  const x0=-w/2,y0=-h/2,z0=-d/2, x1=w/2,y1=h/2,z1=d/2,c=chamfer;
  const pts=[
    [x0,y0+c],[x0+c,y0],[x1-c,y0],[x1,y0+c],
    [x1,y1-c],[x1-c,y1],[x0+c,y1],[x0,y1-c]
  ];
  const verts=[],idx=[];
  function v(x,y,z){const i=verts.length/3;verts.push(x,y,z);return i;}
  for(let i=1;i<7;i++){const a=v(pts[0][0],pts[0][1],z0),b=v(pts[i][0],pts[i][1],z0),c=v(pts[i+1][0],pts[i+1][1],z0);idx.push(a,b,c);}
  for(let i=1;i<7;i++){const a=v(pts[0][0],pts[0][1],z1),b=v(pts[i][0],pts[i][1],z1),c=v(pts[i+1][0],pts[i+1][1],z1);idx.push(a,b,c);}
  for(let i=0;i<8;i++){const j=(i+1)%8;const a=v(pts[i][0],pts[i][1],z0),b=v(pts[j][0],pts[j][1],z0),c=v(pts[j][0],pts[j][1],z1),d=v(pts[i][0],pts[i][1],z1);idx.push(a,b,c,a,c,d);}
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

function init3D(container) {
  if(!THREE||!OrbitControls)return;
  const w = container.clientWidth;
  const h = container.clientHeight;
  if (renderer) { renderer.dispose(); renderer = null; }
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(w, h, false);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  container.innerHTML = '';
  container.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  const _bgColor=getComputedStyle(document.documentElement).getPropertyValue('--surface').trim()||'#1a1714';
  scene.background=new THREE.Color(_bgColor);
  window._scene3d=scene;

  const aspect = w / h;
  camera = new THREE.PerspectiveCamera(60, aspect, 1, 500);

  controls = new OrbitControls(camera, renderer.domElement);

  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.minDistance = 5;
  controls.maxDistance = Infinity;
  controls.maxPolarAngle = Math.PI * 0.75;
  controls.update();

  const amb = new THREE.AmbientLight('#b0a89e', 1.8);
  scene.add(amb);

  const fill = new THREE.DirectionalLight('#c8d8ff', 1.2);
  fill.position.set(-10, 5, -8);
  scene.add(fill);

  const rim = new THREE.DirectionalLight('#ffe0c0', 1.5);
  rim.position.set(0, 0, -15);
  scene.add(rim);

}

window.render3DPreview = function() {
  if(!THREE)return;
  const container = document.getElementById('view3D');
  if (!container || container.offsetWidth === 0) return;
  if (!renderer || !scene) init3D(container);

  if (currentGroup) { scene.remove(currentGroup); disposeGroup(currentGroup); }
  currentGroup = new THREE.Group();

  const p = window.get3DParams ? window.get3DParams() : { beadDia: 10, innerGap: 10, wallThick: 1, wallHeight: 10, baseThick: 0.4, includeBase: true, outlineMode: false };
  const pm = window.pixelMap, am = window.activeMask, pal = window.palette;
  const gw = window.gridW, gh = window.gridH;
  if (!pm || !am || !pal) return;

  const cellSize = p.innerGap + p.wallThick * 2;
  const pegGap = p.wallThick;
  const baseH = p.baseThick;
  const pegH = p.wallHeight;
  const margin = cellSize * 2;
  const offX = (gw * cellSize) / -2;
  const offY = (gh * cellSize) / -2;

  // Build materials cache
  const mats = {};
  pal.forEach((c, i) => {
    const hex = '#' + [c.r, c.g, c.b].map(v => v.toString(16).padStart(2, '0')).join('');
    mats[i] = new THREE.MeshStandardMaterial({
      color: new THREE.Color(hex),
      roughness: 0.35,
      metalness: 0.05
    });
  });

  // Peg geometry (reusable)
  if (p.showBeads !== false) {
  const hasSnap = p.snapDepth > 0 && p.snapHeight > 0;
  const pegGeo = createChamferedBoxGeometry(p.beadDia, p.beadDia, pegH, p.chamfer);
  let pegGeoLower = null, pegGeoGroove = null, pegGeoUpper = null;
  if (hasSnap) {
    const gz = pegH*0.5 - p.snapHeight*0.5;
    pegGeoLower = new THREE.BoxGeometry(p.beadDia, p.beadDia, gz);
    pegGeoLower.translate(0, 0, gz/2);
    pegGeoGroove = new THREE.BoxGeometry(p.beadDia - p.snapDepth*2, p.beadDia - p.snapDepth*2, p.snapHeight);
    pegGeoGroove.translate(0, 0, gz + p.snapHeight/2);
    pegGeoUpper = new THREE.BoxGeometry(p.beadDia, p.beadDia, pegH - gz - p.snapHeight);
    pegGeoUpper.translate(0, 0, gz + p.snapHeight + (pegH - gz - p.snapHeight)/2);
  }

  for (let i = 0; i < pm.length; i++) {
    if (!am[i]) continue;
    const ci = pm[i];
    const gx = i % gw, gy = Math.floor(i / gw);
    const cx = offX + gx * cellSize + cellSize / 2;
    const cy = offY + (gh - 1 - gy) * cellSize + cellSize / 2;
    const mat = mats[ci];

    if (hasSnap) {
      const pegL = new THREE.Mesh(pegGeoLower, mat);
      pegL.position.set(cx, cy, baseH);
      currentGroup.add(pegL);
      const pegG = new THREE.Mesh(pegGeoGroove, mat);
      pegG.position.set(cx, cy, baseH);
      currentGroup.add(pegG);
      const pegU = new THREE.Mesh(pegGeoUpper, mat);
      pegU.position.set(cx, cy, baseH);
      currentGroup.add(pegU);
    } else {
      const peg = new THREE.Mesh(pegGeo, mat);
      peg.position.set(cx, cy, baseH + pegH / 2);
      currentGroup.add(peg);
    }
  }
  }

  // Bottom plate: only under active bean cells (bean outline area)
  if (p.includeBase) {
    const boardMat = new THREE.MeshStandardMaterial({ color: '#2a2724', roughness: 0.5, metalness: 0.1 });
    const cellBaseGeo = new THREE.BoxGeometry(cellSize, cellSize, baseH);
    for (let i = 0; i < am.length; i++) {
      if (!am[i]) continue;
      const gx = i % gw, gy = Math.floor(i / gw);
      const cx = offX + gx * cellSize + cellSize / 2;
      const cy = offY + (gh - 1 - gy) * cellSize + cellSize / 2;
      const base = new THREE.Mesh(cellBaseGeo, boardMat);
      base.position.set(cx, cy, baseH / 2);
      currentGroup.add(base);
    }
  }

  // Grid template walls: at every boundary where at least one side has a bean (independent of base plate)
  if (p.outlineMode) {
    const hw = p.wallThick * 0.5;
    const wallGeoH = new THREE.BoxGeometry(cellSize + p.wallThick, p.wallThick, pegH);
    const wallGeoV = new THREE.BoxGeometry(p.wallThick, cellSize + p.wallThick, pegH);
    const boardMat = new THREE.MeshStandardMaterial({ color: '#2a2724', roughness: 0.5, metalness: 0.1 });
    // Horizontal boundaries (between row gy-1 and gy)
    for (let gy = 0; gy <= gh; gy++) {
      for (let gx = 0; gx < gw; gx++) {
        const above = (gy - 1 >= 0 && gy - 1 < gh) ? am[(gy - 1) * gw + gx] : 0;
        const below = (gy >= 0 && gy < gh) ? am[gy * gw + gx] : 0;
        if (!!above || !!below) {
          const wy = offY + (gh - gy) * cellSize;
          const wx = offX + gx * cellSize + cellSize / 2;
          const wh = new THREE.Mesh(wallGeoH, boardMat);
          wh.position.set(wx, wy, baseH + pegH / 2);
          currentGroup.add(wh);
        }
      }
    }
    // Vertical boundaries (between col gx-1 and gx)
    for (let gx = 0; gx <= gw; gx++) {
      for (let gy = 0; gy < gh; gy++) {
        const left = (gx - 1 >= 0 && gx - 1 < gw) ? am[gy * gw + (gx - 1)] : 0;
        const right = (gx >= 0 && gx < gw) ? am[gy * gw + gx] : 0;
        if (!!left || !!right) {
          const wx = offX + gx * cellSize;
          const wy = offY + (gh - 1 - gy) * cellSize + cellSize / 2;
          const wv = new THREE.Mesh(wallGeoV, boardMat);
          wv.position.set(wx, wy, baseH + pegH / 2);
          currentGroup.add(wv);
        }
      }
    }
    // Snap ribs (3D): thin horizontal rib on wall faces
    if(p.snapDepth>0&&p.snapHeight>0){
      const sd=p.snapDepth,sh=p.snapHeight;
      const gz=baseH+pegH*0.5-sh*0.5;
      const ribMat=new THREE.MeshStandardMaterial({color:'#2a2724',roughness:0.5,metalness:0.1});
      const hRibGeo=new THREE.BoxGeometry(cellSize+p.wallThick,p.wallThick+sd*2,sh);
      hRibGeo.translate(0,0,sh/2);
      const vRibGeo=new THREE.BoxGeometry(p.wallThick+sd*2,cellSize+p.wallThick,sh);
      vRibGeo.translate(0,0,sh/2);
      const hasBean3D=(gx,gy)=>gx>=0&&gx<gw&&gy>=0&&gy<gh&&am[gy*gw+gx];
      for(let gy=0;gy<=gh;gy++){
        for(let gx=0;gx<gw;gx++){
          if(!(hasBean3D(gx,gy-1)&&hasBean3D(gx,gy)))continue;
          const wy=offY+(gh-gy)*cellSize;
          const cx=offX+gx*cellSize+cellSize/2;
          {const t=new THREE.Mesh(hRibGeo,ribMat);t.position.set(cx,wy-hw,gz);currentGroup.add(t);}
          {const t=new THREE.Mesh(hRibGeo,ribMat);t.position.set(cx,wy+hw,gz);currentGroup.add(t);}
        }
      }
      for(let gx=0;gx<=gw;gx++){
        for(let gy=0;gy<gh;gy++){
          if(!(hasBean3D(gx-1,gy)&&hasBean3D(gx,gy)))continue;
          const wx=offX+gx*cellSize;
          const cy=offY+(gh-1-gy)*cellSize+cellSize/2;
          {const t=new THREE.Mesh(vRibGeo,ribMat);t.position.set(wx-hw,cy,gz);currentGroup.add(t);}
          {const t=new THREE.Mesh(vRibGeo,ribMat);t.position.set(wx+hw,cy,gz);currentGroup.add(t);}
        }
      }
    }
  }

  scene.add(currentGroup);

  // Auto-position camera (only first time; preserve user view on param changes)
  const maxDim = Math.max(gw * cellSize, gh * cellSize);
  camera.far = Math.max(500, maxDim * 100);
  camera.near = Math.max(0.01, maxDim * 0.01);
  // Fit entire model in view at ~25% screen fraction
    const fitDist = (maxDim * 1.0) / (2 * Math.tan((camera.fov * Math.PI / 180) / 2));
    // Normalized isometric direction (0.55, -0.7, 0.9) / 1.266
    camera.position.set(fitDist * 0.434, -fitDist * 0.553, fitDist * 0.711);
    controls.target.set(0, 0, (baseH + pegH) / 2);
    controls.maxDistance = Math.max(fitDist * 3, 80);
  camera.updateProjectionMatrix();

  controls.update();
};

function disposeGroup(group) {
  group.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
      else child.material.dispose();
    }
  });
}

// Expose param getter for 3D export
window.get3DParams = function() {
  return {
    beadDia: parseFloat(document.getElementById('beadDia').value),
    innerGap: parseFloat(document.getElementById('innerGap').value),
    wallThick: parseFloat(document.getElementById('wallThick').value),
    wallHeight: parseFloat(document.getElementById('wallHeight').value),
    baseThick: parseFloat(document.getElementById('baseThick').value),
    chamfer: parseFloat(document.getElementById('chamfer').value),
    snapDepth: parseFloat(document.getElementById('snapDepth').value),
    snapHeight: parseFloat(document.getElementById('snapHeight').value),
    includeBase: document.getElementById('includeBase').checked,
    outlineMode: document.getElementById('outlineMode').checked,
    showBeads: document.getElementById('showBeads').checked
  };
};

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  if (controls) controls.update();
  if (renderer && scene && camera) renderer.render(scene, camera);
}
animate();

// Resize handler
window.addEventListener('resize', () => {
  const container = document.getElementById('view3D');
  if (!renderer || !camera || !container || container.offsetWidth === 0) return;
  const w = container.clientWidth;
  const h = container.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});
</script>
</body>
